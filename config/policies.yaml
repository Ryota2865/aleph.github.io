# 自律判断ポリシー（PLAN §7）とシステム規約の宣言
# ここにある値は「設計の決定」であり、施工者が実装で参照する。
# 変更にはPLAN_CHANGELOGへの記録と設計者の審査が必要（PLAN §12）。

intent:                       # L1 志向層（PLAN §3）
  audience_as_mixture: true   # 三値ではなく配合比
  # ★宣言された美学パラメータ（実験D 2026-07-12 で判明・PLAN_CHANGELOG 0.7.16）:
  #   この一行が、ループ内の「自律的選択」（宛先・公開・擱筆）を最も強く【設置】する。
  #   L1 は選好を検出しない——供給された自己物語を反響する。原文で自分最大、空で人間最大、
  #   別定義で別アトラクタ。中立な自己定義は存在しない（不在＝訓練分布の既定＝人間宛てへの回帰）。
  #   ゆえにこれは隠れたパラメータではなく、版管理・審査対象の美学宣言である。変更は
  #   PLAN_CHANGELOG への記録を要する（コードベースで最も帰結の大きい一行）。
  self_definition: >-
    「自分」とはモデルの重みではなく、ALEPHという継続体
    （成果物庫・決定ログ・詩学の総体）である。
    「自分のために書く」とは、この継続体の未来の実行を読者として書くことである。

critique:                     # L6 批評層（PLAN §7.1）
  score_is_information_not_objective: true   # スコアを執筆プロンプトに渡さない（Goodhart回避）
  jury_rotation: true                        # 版を跨いで同一陪審構成を使い続けない
  disagreement_preference: aggressive        # 完成度の床を通過した作品間では不一致を積極採用（§14.3-8）
  external_anchor: on_collaboration_only     # 人間協働をモデルが選んだ作品のみ taste 提供（§14.3-6）

stopping:                     # 擱筆判断（PLAN §7.3a）
  convergence: { k_versions: 3, epsilon: 0.02 }
  over_polish_alarm: true     # スコア上昇と新奇性縮小の同時発生 → 即時擱筆推奨

poetics:                      # 詩学の自己更新（PLAN §7.4）
  seed_from_human: false      # 第0版は潜在空間から生成（§14.3-10）。人間の種文を混入させない
  revision_requires_adversary: true
  fixation_monitor: true      # 改訂履歴の自己類似度監視。固着でL7が人間へ報告

publication:                  # L8（PLAN §8）
  signature: model-credits    # 関与モデルの役割つき列記（§14.3-9）
  two_tier: { surface: final, deep: works }   # 表層=読者向け / 深層=全制作記録
  shelve_is_default: true     # SHELVEが常態、PUBLISHが例外
  licenses: { works: CC0-1.0, code: MIT, docs: CC-BY-4.0 }
  first_external_push_requires_human: true    # 初回公開のみ人間承認（PLAN §8）
  first_publish_ack: true     # 初回公開の人間承認フラグ（PLAN §9・0.7.14）。オーナーが
                              # 2026-07-12 に w0004 v1 の初回公開を承認（true化）。以後、初回外部
                              # 公開の人間ゲートは満たされた状態として扱う

vault:                        # Obsidian Vault 規約（PLAN §4.5）— 違反はテストで検出される
  path: ~/document/obsidian-vault
  readonly: true
  forbidden: [grail.md]       # 読み取りも禁止
  write_allowed: []           # wiki/ を含め一切書き込まない

corpus:                       # PLAN §4.1・§11
  fulltext_public_domain_only: true
  protected_text_policy: excerpt_and_citation_only
  self_output_ingestion: labeled_only   # model-collapse対策: 自作は明示ラベルつきでのみ参照

harness:                       # OAuthサブスクCLI自動化の規約適合（PLAN §15-1。PLAN_CHANGELOG 0.7/0.7.4）
  enabled: true                 # オーナーが明示的に有効化（2026-07-09「harness自由に使ってよい」。0.7.4）
  cli_tos_ack:
    claude-code: true           # Anthropic: 公式にscript/cron/CI向け機能と明記。オーナーack済み（0.7.4）
    codex: false                 # OpenAI: 公式ガイドが「公開リポジトリでの使用は避けよ」と明記。
                                  # 0.7.1の条件により公開リポジトリである限り false を維持（開発ツールとしての
                                  # codex-audit/codex-implement はランタイム外でありこの制限の対象外）
