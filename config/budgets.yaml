# 予算宣言（PLAN §2.1・§11・§14.1）— 3系統を別々に計上する
api:
  usd_per_month: 71.0        # オーナー決定（10→...→36→44→52→65→71へ段階引き上げ）。
                             # 2026-07-18に52→65: w0008三腕アブレーション＋正典L6ループ用
                             # （実験キャップ$15と本日のクレジット追加をオーナー承認済み。
                             # 走行が月次52に到達しnone腕執筆中に停止したため）。
                             # Fable5利用可能期間中の試行回数確保を目的とした暫定上限。
                             # 2026-07-19に65→71: w0009の全phase包絡$12を月次台帳内に
                             # 事前確保するためオーナー承認。上限であり支出目標ではない。
                             # 適正額・支出目標ではなく、費用来歴整備後に再校正する
  usd_per_work: 9.0          # 3.0→4.5→6.0→8.0→9.0。w0005で公開ゲートの保守的precheckが
                             # FINISH時に作品上限へ達したため9.0へ調整。月上限44が最終防壁
harness:
  calls_per_day: 40          # 控えめ運用（PLAN §15-1 の作業前提）
  concurrent: 1
local:
  gpu_hours_per_day: 8
  swap_cost_seconds: 90      # モデル交換コスト。実測81秒（2026-07-09、26B→27B Q4、RTX 3090実機）に余裕を持たせ校正

publish:                     # 公開の規律（PLAN §7.3d・§14.3-7）
  max_per_month: 999         # 2026-07限定でオーナーが撤廃（PLAN_CHANGELOG 0.7.18-2）。
                             # 理由: Fable5の批評が7/19のサブスク失効前に貴重なため、今月は
                             # 週刊連載のリズムより公開数を優先。8月は4を初期値に再審査し、
                             # RSI観測に必要なら4超の新上限を明示決定してよい。
  cadence: weekly
  full_novel_per_month: 1    # 完成長編の一括公開の目安

opportunistic_reentry:       # 機会的エッジの限定予算（PLAN §2.4）
  max_per_work: 2
  scout_calls_each: 30
