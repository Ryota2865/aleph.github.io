# 予算宣言（PLAN §2.1・§11・§14.1）— 3系統を別々に計上する
api:
  usd_per_month: 44.0        # オーナー決定（10→...→28→36へ段階引き上げ）。
                             # 2026-07-13に28→36（純粋条件走行 w0005/w0006 用。オーナーが実残高
                             # Anthropic 6.43 / OpenAI 5.29 USD を明示して承認。実支出は実残高と
                             # usd_per_work=8 で律速）。上限であり支出目標ではない
  usd_per_work: 9.0          # 3.0→4.5→6.0→8.0（PLAN_CHANGELOG 0.7.9）: w0001の統合デバッグ実費
                             # ~$1.1に加え、precheckのmax_tokensベース見積り（実費の3-4倍）が
                             # DRAFT途中で早期ブロックしたため。月上限$18が最終防壁
harness:
  calls_per_day: 40          # 控えめ運用（PLAN §15-1 の作業前提）
  concurrent: 1
local:
  gpu_hours_per_day: 8
  swap_cost_seconds: 90      # モデル交換コスト。実測81秒（2026-07-09、26B→27B Q4、RTX 3090実機）に余裕を持たせ校正

publish:                     # 公開の規律（PLAN §7.3d・§14.3-7）
  max_per_month: 4           # 週刊連載のリズム。周期性の維持自体が設計目標
  cadence: weekly
  full_novel_per_month: 1    # 完成長編の一括公開の目安

opportunistic_reentry:       # 機会的エッジの限定予算（PLAN §2.4）
  max_per_work: 2
  scout_calls_each: 30
